{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header"><h4>Inscription</h4></div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3"><label for="username">Nom d'utilisateur</label><input type="text" class="form-control" name="username" required></div>
                    <div class="mb-3"><label for="email">Email</label><input type="email" class="form-control" name="email" required></div>
                    <div class="mb-3"><label for="password">Mot de passe</label><input type="password" class="form-control" name="password" required></div>
                    <button type="submit" class="btn btn-primary">S'inscrire</button>
                </form>
                <p class="mt-3">Déjà un compte ? <a href="{{ url_for('auth.login') }}">Connectez-vous</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
