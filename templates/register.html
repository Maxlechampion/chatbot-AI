{% extends "base_auth.html" %}

{% block title %}Inscription – HIGHFIVE AI{% endblock %}

{% block content %}
<h3 class="text-xl font-bold text-white text-center mb-2">Créer un compte HIGHFIVE</h3>
<p class="text-zinc-500 text-center text-sm mb-6">Rejoignez la communauté HIGHFIVE Coding University</p>

<form method="POST" class="space-y-4">
    <div>
        <label class="block text-zinc-400 text-xs font-semibold uppercase tracking-wider mb-1">Nom d'utilisateur</label>
        <input type="text" name="username" required placeholder="Votre pseudonyme..."
               class="w-full bg-[#18181b] border border-zinc-700/60 focus:border-amber-500 rounded-xl px-4 py-3 text-sm text-zinc-200 placeholder-zinc-600 focus:outline-none focus:ring-2 focus:ring-amber-500/10 transition">
    </div>
    <div>
        <label class="block text-zinc-400 text-xs font-semibold uppercase tracking-wider mb-1">Email</label>
        <input type="email" name="email" required placeholder="nom@exemple.com"
               class="w-full bg-[#18181b] border border-zinc-700/60 focus:border-amber-500 rounded-xl px-4 py-3 text-sm text-zinc-200 placeholder-zinc-600 focus:outline-none focus:ring-2 focus:ring-amber-500/10 transition">
    </div>
    <div>
        <label class="block text-zinc-400 text-xs font-semibold uppercase tracking-wider mb-1">Mot de passe</label>
        <input type="password" name="password" required minlength="6" placeholder="Minimum 6 caractères..."
               class="w-full bg-[#18181b] border border-zinc-700/60 focus:border-amber-500 rounded-xl px-4 py-3 text-sm text-zinc-200 placeholder-zinc-600 focus:outline-none focus:ring-2 focus:ring-amber-500/10 transition">
    </div>
    <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-zinc-950 font-bold rounded-xl py-3.5 transition duration-150 transform hover:scale-[1.01] shadow-lg shadow-amber-500/15">
        S'enregistrer
    </button>
</form>

<p class="text-center text-xs text-zinc-500 mt-6">
    Déjà inscrit ? <a href="{{ url_for('auth.login') }}" class="text-amber-400 hover:text-amber-300 font-semibold transition">Se connecter</a>
</p>
{% endblock %}
