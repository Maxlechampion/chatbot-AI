<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HIGHFIVE AI – Authentification{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-[#09090b] text-[#f4f4f5] font-sans min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-[#121214] border border-zinc-800 rounded-2xl p-8 shadow-2xl relative overflow-hidden">
        <!-- Décorations -->
        <div class="absolute -top-16 -right-16 w-32 h-32 bg-amber-500/10 rounded-full blur-3xl"></div>
        
        <div class="text-center mb-6 relative">
            <div class="flex items-center justify-center gap-3 mb-2">
                <img src="{{ url_for('static', filename='images/drapeau_benin.jpg') }}" alt="Bénin" class="w-10 h-10 rounded-full border border-zinc-700 object-cover">
                <span class="text-2xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-amber-600">HIGHFIVE AI</span>
                <img src="{{ url_for('static', filename='images/agodjie.jpg') }}" alt="Agodjié" class="w-10 h-10 rounded-full border border-zinc-700 object-cover">
            </div>
            <p class="text-zinc-500 text-xs mt-1">Université de Codage</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <div class="mb-4 p-3 rounded-xl border text-xs font-semibold {{ 'bg-red-500/10 border-red-500/20 text-red-400' if category == 'danger' else 'bg-amber-500/10 border-amber-500/20 text-amber-400' }}">
                        {{ msg }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <script src="{{ url_for('static', filename='scripts.js') }}"></script>
</body>
</html>
