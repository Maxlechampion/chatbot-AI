{% extends "base_auth.html" %}

{% block title %}Connexion – HIGHFIVE AI{% endblock %}

{% block content %}
<h3 class="text-xl font-bold text-white text-center mb-2">Ravi de vous revoir</h3>
<p class="text-zinc-500 text-center text-sm mb-6">Connectez-vous à votre assistant HIGHFIVE</p>

<form method="POST" class="space-y-4">
    <div>
        <label class="block text-zinc-400 text-xs font-semibold uppercase tracking-wider mb-1">Nom d'utilisateur</label>
        <input type="text" name="username" required placeholder="Votre identifiant..."
               class="w-full bg-[#18181b] border border-zinc-700/60 focus:border-amber-500 rounded-xl px-4 py-3 text-sm text-zinc-200 placeholder-zinc-600 focus:outline-none focus:ring-2 focus:ring-amber-500/10 transition">
    </div>
    <div>
        <div class="flex items-center justify-between mb-1">
            <label class="block text-zinc-400 text-xs font-semibold uppercase tracking-wider">Mot de passe</label>
            <a href="{{ url_for('auth.forgot_password') }}" class="text-xs text-amber-400 hover:text-amber-300 font-medium transition">Oublié ?</a>
        </div>
        <input type="password" name="password" required placeholder="Votre mot de passe..."
               class="w-full bg-[#18181b] border border-zinc-700/60 focus:border-amber-500 rounded-xl px-4 py-3 text-sm text-zinc-200 placeholder-zinc-600 focus:outline-none focus:ring-2 focus:ring-amber-500/10 transition">
    </div>
    <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-zinc-950 font-bold rounded-xl py-3.5 transition duration-150 transform hover:scale-[1.01] shadow-lg shadow-amber-500/15">
        Se connecter
    </button>
</form>

<p class="text-center text-xs text-zinc-500 mt-6">
    Pas encore inscrit ? <a href="{{ url_for('auth.register') }}" class="text-amber-400 hover:text-amber-300 font-semibold transition">Créer un compte HIGHFIVE</a>
</p>
{% endblock %}
