{% extends "base.html" %}
{% block content %}
<div style="display:flex; justify-content:center; align-items:center; min-height:80vh;">
    <div style="background:var(--bg-card); border:1px solid var(--border); border-radius:1rem; padding:2rem; width:100%; max-width:400px;">
        <h3 style="text-align:center; margin-bottom:1.5rem; color:var(--accent);">Nouveau mot de passe</h3>
        <form method="POST">
            <div style="margin-bottom:1rem;">
                <label style="color:var(--text-secondary); font-size:0.9rem;">Nouveau mot de passe</label>
                <input type="password" name="password" required minlength="6"
                       style="width:100%; background:var(--bg-primary); border:1px solid var(--border); 
                              border-radius:0.5rem; padding:0.7rem; color:var(--text-primary); margin-top:0.3rem;">
            </div>
            <div style="margin-bottom:1rem;">
                <label style="color:var(--text-secondary); font-size:0.9rem;">Confirmer le mot de passe</label>
                <input type="password" name="confirm_password" required minlength="6"
                       style="width:100%; background:var(--bg-primary); border:1px solid var(--border); 
                              border-radius:0.5rem; padding:0.7rem; color:var(--text-primary); margin-top:0.3rem;">
            </div>
            <button type="submit" 
                    style="width:100%; background:var(--accent); border:none; border-radius:0.5rem; 
                           padding:0.7rem; color:#1f2937; font-weight:600; cursor:pointer;">
                Réinitialiser
            </button>
        </form>
    </div>
</div>
{% endblock %}
