<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{% block title %}HIGHFIVE UNIVERSITY AI{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>marked.setOptions({ async: false, breaks: true, gfm: true });</script>
    <style>
        /* --- VARIABLES (thème jaune/or) --- */
        :root {
            --bg-primary: #0a0c10;
            --bg-secondary: #111317;
            --bg-sidebar: #0f1117;
            --bg-card: #1a1d24;
            --bg-hover: #20242c;
            --accent: #f59e0b;
            --accent-hover: #d97706;
            --accent-light: #fbbf24;
            --text-primary: #f0f3fa;
            --text-secondary: #8e9aaf;
            --border: #20242c;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.2);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.3);
            --chat-bg: var(--bg-primary);
        }
        body.light {
            --bg-primary: #fefce8;
            --bg-secondary: #ffffff;
            --bg-sidebar: #fffbeb;
            --bg-card: #ffffff;
            --bg-hover: #fef3c7;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border: #fde68a;
            --chat-bg: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }
        .app-container { display: flex; height: 100vh; }

        /* ===== SIDEBAR (inchangée, style épuré) ===== */
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header { padding: 1.2rem; border-bottom: 1px solid var(--border); }
        .logo {
            font-size: 1.2rem; font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            -webkit-background-clip: text; background-clip: text; color: transparent;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .new-chat-btn {
            width: 100%; background: var(--accent); border: none; padding: 0.7rem;
            border-radius: 0.8rem; color: #1f2937; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            cursor: pointer; margin-top: 1rem; transition: 0.2s;
        }
        .new-chat-btn:hover { background: var(--accent-hover); color: white; }
        .sessions-list { flex: 1; overflow-y: auto; padding: 1rem; }
        .session-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.6rem 0.8rem; border-radius: 0.6rem; cursor: pointer;
            transition: 0.2s; color: var(--text-secondary); font-size: 0.9rem;
        }
        .session-item:hover { background: var(--bg-hover); color: var(--text-primary); }
        .session-item.active { background: var(--accent); color: #1f2937; }
        .session-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .delete-session { opacity: 0; background: none; border: none; color: inherit; cursor: pointer; }
        .session-item:hover .delete-session { opacity: 1; }
        .sidebar-footer { padding: 1rem; border-top: 1px solid var(--border); }
        .user-settings { display: flex; flex-direction: column; gap: 0.5rem; }
        .settings-item {
            display: flex; align-items: center; gap: 0.7rem; padding: 0.5rem;
            border-radius: 0.6rem; color: var(--text-secondary); cursor: pointer;
            transition: 0.2s;
        }
        .settings-item:hover { background: var(--bg-hover); color: var(--text-primary); }

        /* ===== MAIN CHAT ===== */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--chat-bg);
            position: relative;
        }

        /* Chat header (titre de conversation + modèle) */
        .chat-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-sidebar);
        }
        .chat-header h2 {
            font-size: 1.1rem;
            font-weight: 500;
            margin: 0;
        }
        .model-selector select {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.3rem 1rem;
            color: var(--text-primary);
            font-size: 0.8rem;
        }

        /* Zone des messages (scroll) */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        /* BULLES DE MESSAGE (COMME CHATGPT) */
        .message-bubble {
            max-width: 75%;
            padding: 0.8rem 1rem;
            border-radius: 1.2rem;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: fadeIn 0.2s ease;
            word-wrap: break-word;
        }
        .user-message {
            align-self: flex-end;
            background: var(--accent);
            color: #1f2937;
            border-bottom-right-radius: 0.3rem;
        }
        .bot-message {
            align-self: flex-start;
            background: var(--bg-card);
            color: var(--text-primary);
            border-bottom-left-radius: 0.3rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ZONE DE SAISIE (COMME CHATGPT) */
        .input-container {
            padding: 1rem 1.5rem 1.5rem;
            border-top: 1px solid var(--border);
            background: var(--bg-primary);
        }
        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 0.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 0.5rem 0.5rem 0.5rem 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(245,158,11,0.2);
        }
        .input-wrapper textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            resize: none;
            outline: none;
            padding: 0.5rem 0;
            max-height: 150px;
        }
        .send-btn {
            background: var(--accent);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            color: #1f2937;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .send-btn:hover {
            background: var(--accent-hover);
            color: white;
            transform: scale(1.02);
        }
        /* Toolbar au-dessus de l'input (boutons recherche, raisonnement, etc.) */
        .input-toolbar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.6rem;
            padding: 0 0.2rem;
        }
        .tool-btn {
            background: transparent;
            border: none;
            border-radius: 0.5rem;
            width: 32px;
            height: 32px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: 0.2s;
            font-size: 1rem;
        }
        .tool-btn:hover {
            background: var(--bg-hover);
            color: var(--accent);
        }
        .tool-btn.active {
            background: var(--accent);
            color: #1f2937;
        }
        .tool-spacer {
            flex: 1;
        }
        .suggestions {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-top: 0.8rem;
        }
        .suggestion-chip {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.3rem 1rem;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .suggestion-chip:hover {
            background: var(--accent);
            color: #1f2937;
            border-color: var(--accent);
        }

        /* Indicateur de frappe */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 0.6rem 1rem;
            background: var(--bg-card);
            border-radius: 1rem;
            width: fit-content;
        }
        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: pulse 1.4s infinite;
        }
        @keyframes pulse {
            0%,60%,100% { opacity: 0.4; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-4px); }
        }

        /* Scrollbar personnalisée */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-secondary); border-radius: 5px; }

        /* Styles markdown (identiques à ChatGPT) */
        .markdown-content {
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .markdown-content h1 {
            font-size: 1.5rem; font-weight: 600; margin: 1rem 0 0.5rem;
            border-bottom: 2px solid var(--accent); display: inline-block;
        }
        .markdown-content h2 { font-size: 1.3rem; font-weight: 600; margin: 1rem 0 0.5rem; }
        .markdown-content h3 { font-size: 1.1rem; font-weight: 600; margin: 0.8rem 0 0.4rem; }
        .markdown-content p { margin-bottom: 0.6rem; }
        .markdown-content ul, .markdown-content ol { margin: 0.5rem 0 0.8rem 1.5rem; }
        .markdown-content li { margin: 0.2rem 0; }
        .markdown-content table {
            width: 100%; border-collapse: collapse; margin: 1rem 0;
            border-radius: 0.5rem; overflow: hidden;
        }
        .markdown-content th, .markdown-content td {
            border: 1px solid var(--border); padding: 0.5rem 0.8rem;
            text-align: left;
        }
        .markdown-content th {
            background: rgba(245,158,11,0.1); font-weight: 600;
        }
        .markdown-content tr:nth-child(even) { background: rgba(255,255,255,0.02); }
        body.light .markdown-content tr:nth-child(even) { background: #fffbeb; }
        .markdown-content code {
            background: rgba(0,0,0,0.4); padding: 0.2rem 0.4rem; border-radius: 0.3rem;
            font-family: monospace; font-size: 0.85em;
        }
        .markdown-content pre {
            background: #1e1e2f; border-radius: 0.5rem; padding: 0.8rem;
            overflow-x: auto; margin: 0.8rem 0;
        }
        body.light .markdown-content pre { background: #f3f4f6; }
        .markdown-content pre code { background: transparent; padding: 0; color: #e2e8f0; }
        body.light .markdown-content pre code { color: #1e293b; }
        .markdown-content blockquote {
            border-left: 4px solid var(--accent);
            margin: 0.6rem 0; padding: 0.3rem 1rem;
            background: rgba(245,158,11,0.05);
            border-radius: 0 0.5rem 0.5rem 0;
            font-style: italic;
        }

        /* ========== RESPONSIVE DESIGN ========== */

/* Tablettes et petits écrans (< 900px) */
@media (max-width: 900px) {
    .sidebar {
        width: 240px; /* légèrement plus étroite */
    }
    .message-bubble {
        max-width: 85%; /* un peu plus large */
    }
    .chat-header h2 {
        font-size: 1rem;
    }
}

/* Mobiles (< 768px) */
@media (max-width: 768px) {
    .app-container {
        flex-direction: column; /* sidebar passe au-dessus du chat */
    }
    .sidebar {
        width: 100%;
        height: auto;
        max-height: 70px; /* réduction à une barre horizontale */
        overflow-x: auto;
        flex-direction: row;
        align-items: center;
        padding: 0.5rem;
        border-right: none;
        border-bottom: 1px solid var(--border);
    }
    .sidebar-header {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0 0.5rem;
        border-bottom: none;
    }
    .logo {
        font-size: 1rem;
        white-space: nowrap;
    }
    .new-chat-btn {
        margin-top: 0;
        padding: 0.4rem 0.8rem;
        font-size: 0.8rem;
        width: auto;
    }
    .sessions-list {
        display: flex;
        flex-direction: row;
        overflow-x: auto;
        gap: 0.5rem;
        padding: 0.5rem;
        width: 100%;
    }
    .session-item {
        white-space: nowrap;
        padding: 0.4rem 0.8rem;
        font-size: 0.8rem;
    }
    .session-name {
        white-space: nowrap;
    }
    .sidebar-footer {
        display: none; /* masquer les paramètres sur mobile pour gagner de la place */
    }
    .main-chat {
        height: calc(100vh - 70px);
    }
    .messages-area {
        padding: 1rem;
    }
    .message-bubble {
        max-width: 90%;
        font-size: 0.9rem;
        padding: 0.6rem 0.9rem;
    }
    .input-container {
        padding: 0.8rem;
    }
    .input-wrapper textarea {
        font-size: 0.9rem;
    }
    .tool-btn {
        width: 28px;
        height: 28px;
        font-size: 0.9rem;
    }
    .suggestion-chip {
        font-size: 0.7rem;
        padding: 0.2rem 0.7rem;
    }
    .chat-header {
        padding: 0.7rem 1rem;
    }
    .model-selector select {
        font-size: 0.7rem;
        padding: 0.2rem 0.6rem;
    }
}

/* Très petits mobiles (< 480px) */
@media (max-width: 480px) {
    .sidebar {
        max-height: 60px;
    }
    .logo {
        font-size: 0.85rem;
    }
    .new-chat-btn {
        font-size: 0.7rem;
        padding: 0.3rem 0.6rem;
    }
    .session-item {
        font-size: 0.7rem;
        padding: 0.3rem 0.6rem;
    }
    .message-bubble {
        max-width: 95%;
        font-size: 0.85rem;
    }
    .input-wrapper {
        padding: 0.3rem 0.3rem 0.3rem 0.8rem;
    }
    .send-btn {
        width: 32px;
        height: 32px;
    }
    .tool-btn {
        width: 26px;
        height: 26px;
    }
    .suggestions {
        gap: 0.5rem;
    }
    .suggestion-chip {
        font-size: 0.65rem;
    }
    .markdown-content table {
        font-size: 0.7rem;
    }
    .markdown-content th, .markdown-content td {
        padding: 0.3rem 0.5rem;
    }
}
    </style>
</head>
<body>
<div class="app-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo"><i class="fas fa-graduation-cap"></i> HIGHFIVE UNIVERSITY AI</div>
            <button class="new-chat-btn" id="newChatBtn"><i class="fas fa-plus"></i> Nouvelle conversation</button>
        </div>
        <div class="sessions-list" id="sessionsList"></div>
        <div class="sidebar-footer">
            <div class="user-settings">
                <div class="settings-item" id="settingsAccount"><i class="fas fa-user-circle"></i> Compte</div>
                <div class="settings-item" id="imageGenBtn"><i class="fas fa-image"></i> Générer une image</div>
                <div class="settings-item" id="videoGenBtn"><i class="fas fa-video"></i> Générer une vidéo</div>
                <div class="settings-item" id="themeToggle"><i class="fas fa-moon"></i> Thème</div>
            </div>
        </div>
    </div>
    <div class="main-chat">
        <div class="chat-header">
            <h2 id="conversationTitle">Assistant IA</h2>
            <div class="model-selector">
                <select id="modelSelect">
                    {% for model in models %}
                    <option value="{{ model.id }}">{{ model.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="messages-area" id="messagesArea">
            <div style="text-align:center; margin-top:2rem;">
                <i class="fas fa-graduation-cap" style="font-size:2rem; color:var(--accent);"></i>
                <h3>Comment puis-je vous aider aujourd'hui ?</h3>
            </div>
        </div>
        <div class="input-container">
            <div class="input-toolbar">
                <button id="searchToggleBtn" class="tool-btn" title="Recherche web"><i class="fas fa-globe"></i></button>
                <button id="reasoningToggleBtn" class="tool-btn" title="Réflexion approfondie"><i class="fas fa-brain"></i></button>
                <div class="tool-spacer"></div>
                <button id="attachBtn" class="tool-btn" title="Joindre un fichier"><i class="fas fa-paperclip"></i></button>
                <button id="micBtn" class="tool-btn" title="Entrée vocale"><i class="fas fa-microphone"></i></button>
            </div>
            <div class="input-wrapper">
                <textarea id="userInput" rows="1" placeholder="Écrivez votre message..."></textarea>
                <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
            <div class="suggestions" id="suggestions">
                <div class="suggestion-chip" data-suggestion="Write an email">✉️ Write an email</div>
                <div class="suggestion-chip" data-suggestion="Create image prompt">🎨 Create image prompt</div>
                <div class="suggestion-chip" data-suggestion="Explain code in Python">🐍 Code in Python</div>
            </div>
        </div>
    </div>
</div>
<script>
    function loadTheme() {
        const theme = localStorage.getItem('highfive_theme');
        if (theme === 'light') document.body.classList.add('light');
    }
    function toggleTheme() {
        document.body.classList.toggle('light');
        localStorage.setItem('highfive_theme', document.body.classList.contains('light') ? 'light' : 'dark');
    }
    loadTheme();
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);
</script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
