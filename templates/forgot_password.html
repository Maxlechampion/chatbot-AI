{% extends "base.html" %}
{% block content %}
<div style="display:flex; justify-content:center; align-items:center; min-height:80vh;">
    <div style="background:var(--bg-card); border:1px solid var(--border); border-radius:1rem; padding:2rem; width:100%; max-width:400px;">
        <h3 style="text-align:center; margin-bottom:1.5rem; color:var(--accent);">Mot de passe oublié</h3>
        <p style="color:var(--text-secondary); font-size:0.85rem; text-align:center; margin-bottom:1rem;">
            Saisissez votre email pour recevoir un lien de réinitialisation.
        </p>
        <form method="POST">
            <div style="margin-bottom:1rem;">
                <label style="color:var(--text-secondary); font-size:0.9rem;">Email</label>
                <input type="email" name="email" required 
                       style="width:100%; background:var(--bg-primary); border:1px solid var(--border); 
                              border-radius:0.5rem; padding:0.7rem; color:var(--text-primary); margin-top:0.3rem;">
            </div>
            <button type="submit" 
                    style="width:100%; background:var(--accent); border:none; border-radius:0.5rem; 
                           padding:0.7rem; color:#1f2937; font-weight:600; cursor:pointer;">
                Envoyer le lien
            </button>
        </form>
        <p style="text-align:center; margin-top:1rem; color:var(--text-secondary);">
            <a href="{{ url_for('auth.login') }}" style="color:var(--accent); text-decoration:none;">Retour à la connexion</a>
        </p>
    </div>
</div>
{% endblock %}
