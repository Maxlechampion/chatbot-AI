{% extends "base_auth.html" %}

{% block title %}Mot de passe oublié{% endblock %}

{% block content %}
<h3 class="text-xl font-bold text-white text-center mb-2">Mot de passe oublié</h3>
<p class="text-zinc-500 text-center text-sm mb-6">Saisissez votre email pour recevoir un lien de réinitialisation.</p>

<form method="POST" class="space-y-4">
    <div>
        <label class="block text-zinc-400 text-xs font-semibold uppercase tracking-wider mb-1">Email</label>
        <input type="email" name="email" required placeholder="votre@email.com"
               class="w-full bg-[#18181b] border border-zinc-700/60 focus:border-amber-500 rounded-xl px-4 py-3 text-sm text-zinc-200 placeholder-zinc-600 focus:outline-none focus:ring-2 focus:ring-amber-500/10 transition">
    </div>
    <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-zinc-950 font-bold rounded-xl py-3.5 transition duration-150 transform hover:scale-[1.01] shadow-lg shadow-amber-500/15">
        Envoyer le lien
    </button>
</form>

<p class="text-center text-xs text-zinc-500 mt-6">
    <a href="{{ url_for('auth.login') }}" class="text-amber-400 hover:text-amber-300 font-semibold transition">Retour à la connexion</a>
</p>
{% endblock %}
